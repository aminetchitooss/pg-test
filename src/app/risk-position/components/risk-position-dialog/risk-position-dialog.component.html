<h2 mat-dialog-title>{{ viewType === 'pnl-attribution' ? 'P&L Attribution' : 'Risk Position' }}</h2>
<mat-dialog-content class="dialog-content">
  <app-risk-position-controls
    [multipliers]="store.multipliers()"
    [spreadCurves]="store.spreadCurves()"
    [isLoading]="store.isLoading()"
    (multipliersChange)="onMultipliersChange($event)"
    (spreadCurvesChange)="store.updateSpreadCurves($event)"
    (refreshRisk)="onRefreshRisk()"
    (refreshInputs)="onRefreshInputs()"
    (exportPositions)="onExportPositions()"
  />

  @if (store.error(); as error) {
    <div class="error-message" role="alert">Failed to load data. Please try refreshing.</div>
  } @else if (store.columns().length > 0) {
    <app-risk-position-grid
      [columns]="store.columns()"
      [rows]="store.rows()"
      [multipliers]="store.multipliers()"
      (cellValueChanged)="onCellValueChanged($event)"
    />
  } @else {
    <div class="loading-placeholder" role="status" aria-label="Loading">Loading data...</div>
  }

  <app-risk-position-status-bar [status]="store.status()" />
</mat-dialog-content>
