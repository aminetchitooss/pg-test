<div class="controls-row">
  <fieldset class="control-group">
    <legend>Multipliers</legend>
    <div class="multiplier-fields">
      <label class="field">
        <span class="field-label">Reflex Position Multiplier</span>
        <input
          type="number"
          [ngModel]="multipliers().reflexPositionMultiplier"
          (ngModelChange)="onMultiplierChange('reflexPositionMultiplier', $event)"
          aria-label="Reflex Position Multiplier"
        />
      </label>
      <label class="field">
        <span class="field-label">Manual Adjustment Multiplier</span>
        <input
          type="number"
          [ngModel]="multipliers().manualAdjustmentMultiplier"
          (ngModelChange)="onMultiplierChange('manualAdjustmentMultiplier', $event)"
          aria-label="Manual Adjustment Multiplier"
        />
      </label>
      <label class="field">
        <span class="field-label">Target Position Multiplier</span>
        <input
          type="number"
          [ngModel]="multipliers().targetPositionMultiplier"
          (ngModelChange)="onMultiplierChange('targetPositionMultiplier', $event)"
          aria-label="Target Position Multiplier"
        />
      </label>
    </div>
  </fieldset>

  <fieldset class="control-group">
    <legend>Control</legend>
    <div class="control-buttons">
      <div class="button-column">
        <button
          mat-raised-button
          aria-label="Refresh Risk"
          [disabled]="riskLoading()"
          (click)="refreshRisk.emit()"
        >
          {{ riskLoading() ? 'Refreshing Risk…' : 'Refresh Risk' }}
        </button>
        <button
          mat-raised-button
          aria-label="Refresh Inputs"
          [disabled]="configLoading()"
          (click)="refreshInputs.emit()"
        >
          {{ configLoading() ? 'Refreshing Inputs…' : 'Refresh Inputs' }}
        </button>
      </div>
      <button
        mat-raised-button
        class="export-button"
        (click)="exportPositions.emit()"
      >
        Export Positions
      </button>
      <div class="toggle-stack">
        <div class="override-toggle">
          <span
            class="override-label"
            [class.active]="override() === 'risk'"
            aria-hidden="true"
            >Risk wins</span
          >
          <mat-slide-toggle
            [checked]="override() === 'inputs'"
            (change)="onOverrideToggle($event.checked)"
            aria-label="Override source: toggle on for Inputs wins, off for Risk wins"
          />
          <span
            class="override-label"
            [class.active]="override() === 'inputs'"
            aria-hidden="true"
            >Inputs wins</span
          >
        </div>
        <div class="include-risk-toggle">
          <mat-slide-toggle
            [checked]="inputsIncludeRiskColumns()"
            (change)="inputsIncludeRiskColumnsChange.emit($event.checked)"
            aria-label="Inputs response includes risk-overlap columns"
          >
            <span class="toggle-caption">Inputs includes risk columns</span>
          </mat-slide-toggle>
        </div>
      </div>
    </div>
  </fieldset>

  <fieldset class="control-group spread-curves">
    <legend>Spread Curves [do not change]</legend>
    <input
      type="text"
      [ngModel]="spreadCurves()"
      (ngModelChange)="onSpreadCurvesChange($event)"
      aria-label="Spread Curves"
    />
  </fieldset>
</div>
